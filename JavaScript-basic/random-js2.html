<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<script>
//함수 먼저 3개 만들기, printH1, printH4, apply
function printH1(content){
	document.write("<h1>" + content + "</h1>"); //h1 태그와 함께 도큐먼트 영역에 출력함
}
function printH4(content){
	document.write("<h4>" + content + "</h4>");//h4 태그와 함께 도큐먼트 영역에 출력함
}
function apply(arr, func){// 매개변수 2개 arr, func
	if(arguments.length !== 2 || !Array.isArray(arr) || typeof func !== "function"){
		console.log("아규먼트 오류");// 아규먼트가 전달되지 않거나, 다른 종류면 오류
		return false;
	} 
 	for(let i = 0; i<arr.length; i++){//배열문 하나씩 돌면서 전달받은 함수 실행
		func(arr[i]);
	} 
 	return true;
}

//전역코드
let arr = []; // 비어있는 배열을 만들고

while(true){// 데이터를 입력받고, 입력된 데이터를 배열에 저장, 이 작업은 취소 버튼을 클릭했을 때 진행
	let input = window.prompt("데이터를 입력하세요 (취소 누르면 종료)");
	if(input === null){
		break;
	}
	arr.push(input);
}
let randomNum = Math.floor(Math.random()*10) + 1;// 입력이 끝나면 1~10사이의 랜덤값 추출
console.log("추출된 난수" + randomNum);
let result;

if(randomNum === 1 || randomNum === 4 || randomNum === 6){//1,4,6 이면 printH1
	result = apply(arr,printH1);
}else if(randomNum === 3 || randomNum === 5 || randomNum === 7){//3,5,7 이면 printH4
	result = apply(arr,printH4);
}else if(randomNum === 8|| randomNum === 9){ //8,9면 ㅋㅋ라는 문자열과 H1출력
	result = apply("ㅋㅋ",printH1);
}else{
	result = apply(arr); //그 외의 숫자 예를 들어 2이면 배열만 전달
}

if(result === true){
	window.alert("처리 성공");
}else{
	window.alert("처리 실패");
}

</script>
</body>
</html>
